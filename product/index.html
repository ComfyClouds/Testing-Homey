<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Homey Vibes | Women's Home Wear Egypt</title>
  <meta name="description" content="Shop this Homey Vibes product — cozy feminine home wear made for every woman. Available in One Size and Big Size. Cash on delivery across Egypt.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://homey-vibes.store/product/">
  <meta property="og:title" content="Homey Vibes — Cozy Home Wear for Women">
  <meta property="og:description" content="Shop Homey Vibes — PJs and Cashes in One Size and Big Size. Cash on delivery across Egypt.">
  <meta property="og:image" content="https://homey-vibes.store/H-V_Logo.jpeg">
  <meta property="og:type" content="product">
  <meta property="og:url" content="https://homey-vibes.store/product/">
  <script id="product-schema" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "Homey Vibes Home Wear",
    "brand": { "@type": "Brand", "name": "Homey Vibes" },
    "image": "https://homey-vibes.store/H-V_Logo.jpeg",
    "description": "Cozy feminine home wear — PJs and Cashes in One Size and Big Size",
    "offers": {
      "@type": "Offer",
      "priceCurrency": "EGP",
      "availability": "https://schema.org/InStock",
      "seller": { "@type": "Organization", "name": "Homey Vibes" }
    }
  }
  </script>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon-192.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="announcement-bar"></div>
<header id="main-header"></header>

<div style="max-width:var(--max-w);margin:0 auto;padding:16px 40px;">
  <nav style="font-size:13px;color:var(--text-light);display:flex;gap:6px;align-items:center;" aria-label="breadcrumb">
    <a href="../" style="color:var(--text-light);">Home</a>
    <span>/</span>
    <a href="../shop/" style="color:var(--text-light);" id="bc-cat-link">Shop</a>
    <span>/</span>
    <span id="bc-name" style="color:var(--text-dark);">Product</span>
  </nav>
</div>

<div style="max-width:var(--max-w);margin:0 auto;padding:0 40px 80px;" id="product-page">
  <div class="spinner"></div>
</div>

<section class="section" style="padding-top:0; display:none;" id="related-section">
  <div class="section-header">
    <p class="section-eyebrow">You may also like</p>
    <h2 class="section-title">More <em>Favourites</em></h2>
  </div>
  <div class="product-grid" id="related-grid"></div>
</section>

<div id="main-footer"></div>

<script>var _BASE_URL = "../";</script>
<script src="../js/config.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/common.js"></script>
<script src="../js/products.js"></script>
<script>
  let _product = null;
  let _selectedSize = null;
  let _qty = 1;

  document.addEventListener('DOMContentLoaded', async () => {
    const id = getParam('id');
    if (!id) { window.location.href = 'shop/'; return; }

    _product = await Products.getById(id);
    if (!_product) {
      document.getElementById('product-page').innerHTML = `
        <div style="text-align:center;padding:80px 40px;">
          <p style="color:var(--text-light);font-size:16px;">Product not found.</p>
          <a href="../shop/" class="btn btn-primary mt-16">Back to Shop</a>
        </div>`;
      return;
    }

    document.title = `${_product.name} — Homey Vibes`;
    renderProduct();
    loadRelated();
  });

  function renderProduct() {
    const p = _product;
    const price = parseFloat(p.price) || 0;
    const salePrice = parseFloat(p.sale_price) || 0;
    const hasDiscount = salePrice > 0 && salePrice < price;
    const displayPrice = hasDiscount ? salePrice : price;

    const imgs = [p.image1, p.image2, p.image3].filter(Boolean);
    if (!imgs.length) imgs.push(`https://placehold.co/600x750/f0e0dc/9d5a5e?text=${encodeURIComponent(p.name)}`);

    // DYNAMIC SIZE LOGIC
    const subcatString = p.subcategory || 'One Size';
    const availableSizes = subcatString.split('/').map(s => s.trim());
    _selectedSize = availableSizes[0];

    document.getElementById('bc-cat-link').href = `../shop/?cat=${encodeURIComponent(p.category)}`;
    document.getElementById('bc-cat-link').textContent = p.category;
    document.getElementById('bc-name').textContent = p.name;

    document.getElementById('product-page').innerHTML = `
      <div class="product-detail">
        <div class="pd-gallery">
          <div class="pd-main-img"><img id="main-img" src="${imgs[0]}" alt="${p.name}"></div>
          ${imgs.length > 1 ? `
          <div class="pd-thumbs">
            ${imgs.map((img, i) => `
              <div class="pd-thumb ${i === 0 ? 'active' : ''}" onclick="switchImg(${i}, this)">
                <img src="${img}" alt="${p.name} view ${i+1}">
              </div>`).join('')}
          </div>` : ''}
        </div>

        <div class="pd-info">
          <div class="pd-category">${p.category} · ${p.subcategory || ''}</div>
          <h1 class="pd-name">${p.name}</h1>
          <div class="pd-price-wrap">
            ${hasDiscount 
              ? `<span class="pd-price-sale">${formatPrice(salePrice)}</span><span class="pd-price-orig">${formatPrice(price)}</span>` 
              : `<span class="pd-price-main">${formatPrice(displayPrice)}</span>`}
            ${hasDiscount ? `<span style="background:var(--rose-dark);color:#fff;font-size:11px;padding:3px 8px;border-radius:4px;letter-spacing:.06em;">SAVE ${Math.round((1 - salePrice/price)*100)}%</span>` : ''}
          </div>

          <p class="pd-desc">${p.description || 'A beautiful, comfortable piece from our collection.'}</p>

          <div class="pd-size-label">Select Size</div>
          <div class="pd-size-options" id="size-options">
            ${availableSizes.map((s, i) => `
              <button class="size-btn ${i === 0 ? 'selected' : ''}" onclick="selectSize('${s}', this)">${s}</button>
            `).join('')}
          </div>

          <div class="pd-qty-wrap">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <input class="qty-num" type="number" value="1" min="1" max="10" id="qty-input" readonly>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <button class="btn btn-primary pd-add-btn" id="add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
          </div>

          <div class="pd-features">
            <div class="pd-feature">
              <div class="pd-feature-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
              <p><strong>Fast delivery across Egypt</strong> — 1 to 7 business days.</p>
            </div>
            <div class="pd-feature">
              <div class="pd-feature-icon"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
              <p><strong>Cash on delivery</strong> — Inspect your order before payment.</p>
            </div>
          </div>

          <div style="margin-top:20px;padding:14px 16px;background:var(--blush);border-radius:var(--radius-sm);font-size:13px;color:var(--text-mid);">
            <strong style="color:var(--rose-dark);">💬 Questions?</strong> Chat with us on 
            <a href="https://wa.me/${CONFIG.WHATSAPP}" target="_blank" style="color:var(--rose-dark);text-decoration:underline;">WhatsApp</a>
          </div>
        </div>
      </div>`;
  }

  function switchImg(i, el) {
    document.getElementById('main-img').src = _product[`image${i+1}`];
    document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function selectSize(size, btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    _selectedSize = size;
  }

  function changeQty(delta) {
    const input = document.getElementById('qty-input');
    _qty = Math.max(1, Math.min(10, parseInt(input.value) + delta));
    input.value = _qty;
  }

  function addToCart() {
    Cart.add({ ..._product, subcategory: _selectedSize }, _qty);
    showToast(`${_product.name} added to cart ✓`);
    const btn = document.getElementById('add-to-cart-btn');
    if (btn) { btn.textContent = 'Added! ✓'; setTimeout(() => btn.textContent = 'Add to Cart', 2000); }
  }

  async function loadRelated() {
    const all = await Products.getFiltered({ category: _product.category });
    const related = all.filter(p => p.id !== _product.id).slice(0, 4);
    if (!related.length) return;
    const sec = document.getElementById('related-section');
    sec.style.display = 'block';
    document.getElementById('related-grid').innerHTML = related.map(p => Products.cardHTML(p)).join('');
    
    document.querySelectorAll('#related-grid .btn-quick-add').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.preventDefault();
        const p = await Products.getById(btn.dataset.id);
        if (p) { Cart.add(p, 1); showToast(`${p.name} added to cart ✓`); }
      });
    });
  }
</script>
</body>
</html>
